<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>ECharts Test</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>

<body style="margin: 0; padding: 20px; background: #0f0f23;">
    <h1 style="color: #fff;">🔥 ECharts Standalone Test</h1>
    <div id="main" style="width: 100%; height: 600px; background: #1a1a2e;"></div>

    <script>
        var myChart = echarts.init(document.getElementById('main'));

        var option = {
            backgroundColor: '#1a1a2e',
            graphic: [{
                type: 'text',
                left: 'center',
                top: 'middle',
                style: {
                    text: '🔥 If you see this, ECharts works!',
                    fontSize: 50,
                    fontWeight: 'bold',
                    fill: '#FF0000',
                    stroke: '#FFFFFF',
                    lineWidth: 3
                }
            }, {
                type: 'circle',
                shape: {
                    cx: 200,
                    cy: 200,
                    r: 100
                },
                style: {
                    fill: '#FFD700',
                    stroke: '#FF00FF',
                    lineWidth: 5
                }
            }],
            series: [{
                type: 'graph',
                layout: 'none',
                data: [{
                    name: 'Test Node',
                    x: 0,
                    y: 0,
                    symbolSize: 150,
                    itemStyle: {
                        color: '#FF0000',
                        borderColor: '#FFFF00',
                        borderWidth: 5
                    },
                    label: {
                        show: true,
                        formatter: 'TEST NODE',
                        color: '#fff',
                        fontSize: 20,
                        fontWeight: 'bold'
                    }
                }],
                links: []
            }]
        };

        myChart.setOption(option);
        console.log('ECharts test initialized!');
    </script>
</body>

</html>
