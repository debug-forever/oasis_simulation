name: Visualization System CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r visualization_system/backend/requirements.txt

      - name: Syntax check (backend)
        run: |
          python -m py_compile visualization_system/backend/main.py
          echo "Backend syntax OK"

  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: visualization_system/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: visualization_system/frontend
        run: npm ci

      - name: Build frontend
        working-directory: visualization_system/frontend
        run: npm run build
